services:
  # 1. The Frontend (React/Vite) - FREE
  - type: web
    name: nexushr-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://nexushr-backend.onrender.com # This will point to the backend below
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 2. The Backend (Java/Spring Boot) - FREE
  - type: web
    name: nexushr-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
      - key: JWT_SECRET
        value: "generate_a_random_secure_password_here"
      - key: DATABASE_URL
        value: "you_will_paste_your_neon_db_url_here" # Get this from Neon.tech
