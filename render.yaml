services:
  - type: web
    name: nexushr-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://your-railway-backend-url.up.railway.app # You will update this later
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
